    <script>
        // ============================================
        // VYBZZ — Full JavaScript Application
        // ============================================

        // === UTILITY FUNCTIONS ===
        const $ = (sel) => document.querySelector(sel);
        const $$ = (sel) => document.querySelectorAll(sel);
        window.isDraggingProgress = false;

        window._openSpotifyModal = function () {
            var overlay = document.getElementById('spotify-modal-overlay');
            document.getElementById('spotify-url-input').value = '';
            document.getElementById('spotify-import-status').textContent = '';
            document.getElementById('spotify-modal-import').disabled = false;
            document.getElementById('spotify-modal-import').textContent = 'Import';
            overlay.style.zIndex = '999';
            overlay.classList.add('show');
        };

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function showToast(msg) {
            const t = $('#toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._timer);
            t._timer = setTimeout(() => t.classList.remove('show'), 2500);
        }

        const defaultThumb = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Crect fill='%23242424' width='200' height='200'/%3E%3Ctext x='100' y='110' text-anchor='middle' fill='%236a6a6a' font-size='48'%3E♪%3C/text%3E%3C/svg%3E";

        // === JIOSAAVN API SERVICE ===
        const SaavnAPI = {
            INSTANCES: [
                'https://musicapp-liart-phi.vercel.app',
                'https://jiosaavn-api-privatecvc2.vercel.app',
                'https://jiosaavn-api-2.vercel.app'
            ],

            async _fetchWithRetry(path) {
                for (const instance of this.INSTANCES) {
                    try {
                        // Some older instances don't use the /api prefix
                        const urlPath = instance.includes('privatecvc2') ? path.replace(/^\/api/, '') : path;
                        const res = await fetch(`${instance}${urlPath}`, { signal: AbortSignal.timeout(8000) });
                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        return await res.json();
                    } catch (e) {
                        console.warn(`Instance ${instance} failed:`, e.message);
                    }
                }
                throw new Error('All API instances failed');
            },

            async search(query, limit = 12) {
                const json = await this._fetchWithRetry(`/api/search/songs?query=${encodeURIComponent(query)}&limit=${limit}`);
                if (!json.success && json.status !== 'SUCCESS') throw new Error('Search failed');
                const results = json.data?.results || json.data || [];
                return results;
            },

            async searchArtists(query, limit = 5) {
                const json = await this._fetchWithRetry(`/api/search/artists?query=${encodeURIComponent(query)}&limit=${limit}`);
                if (!json.success && json.status !== 'SUCCESS') throw new Error('Artist search failed');
                const results = json.data?.results || json.data || [];
                return results;
            },

            async getSongDetails(id) {
                const json = await this._fetchWithRetry(`/api/songs?id=${id}`);
                if (!json.success && json.status !== 'SUCCESS') throw new Error('Song not found');
                return (Array.isArray(json.data) ? json.data[0] : json.data?.[0]) || json.data;
            },

            async getArtist(id) {
                const json = await this._fetchWithRetry(`/api/artists?id=${id}`);
                if (!json.success && json.status !== 'SUCCESS') throw new Error('Artist not found');
                return json.data;
            },

            async getLyrics(id) {
                const json = await this._fetchWithRetry(`/api/songs/${id}/lyrics`);
                if (!json.success && json.status !== 'SUCCESS') throw new Error('Lyrics not found');
                return json.data?.lyrics || json.data || null;
            },

            async getPlaylist(id) {
                const json = await this._fetchWithRetry(`/api/playlists?id=${id}&limit=20`);
                if (!json.success && json.status !== 'SUCCESS') throw new Error('Playlist not found');
                return json.data?.songs || [];
            },

            // Helper: normalize a saavn result into our internal song format
            normalizeSong(item) {
                const imgArr = item.image || [];
                const img = imgArr.length > 0 ? (imgArr[imgArr.length - 1].url || imgArr[imgArr.length - 1].link) : defaultThumb;

                const dlArr = item.downloadUrl || [];
                const dlUrl = dlArr.length > 0 ? (dlArr[dlArr.length - 1].url || dlArr[dlArr.length - 1].link) : null;

                // Handle both formats
                let artist = '';
                let artistId = null;
                if (item.artists?.primary?.length > 0) {
                    artist = item.artists.primary.map(a => a.name).join(', ');
                    if (item.artists.primary[0].id) artistId = item.artists.primary[0].id;
                } else if (item.primaryArtists) {
                    artist = item.primaryArtists;
                    if (item.primaryArtistsId) artistId = item.primaryArtistsId.split(',')[0].trim();
                }

                return {
                    videoId: item.id,
                    title: item.name || 'Unknown',
                    artist: artist || 'Unknown Artist',
                    artistId: artistId,
                    album: item.album?.name || '',
                    thumbnail: img,
                    duration: parseInt(item.duration) || 0,
                    audioUrl: dlUrl,
                    language: (item.language || '').toLowerCase()
                };
            }
        };

        // === LIBRARY MANAGER (localStorage) ===
        const Library = {
            _get(key) {
                try { return JSON.parse(localStorage.getItem(key)) || []; }
                catch { return []; }
            },
            _set(key, val) { localStorage.setItem(key, JSON.stringify(val)); },

            // Home cache management (Refreshes daily after 2 AM)
            getHomeCache() {
                const raw = localStorage.getItem('vybzz_home_cache');
                if (!raw) return null;
                try {
                    const cache = JSON.parse(raw);
                    const now = new Date();
                    const cutoff = new Date();
                    cutoff.setHours(2, 0, 0, 0);
                    // If it's currently before 2 AM, the 'last update' cutoff was 2 AM yesterday
                    if (now.getHours() < 2) cutoff.setDate(cutoff.getDate() - 1);

                    if (cache.lastUpdated < cutoff.getTime()) return null;
                    return cache.sections;
                } catch (e) { return null; }
            },
            setHomeCache(sections) {
                localStorage.setItem('vybzz_home_cache', JSON.stringify({
                    lastUpdated: Date.now(),
                    sections
                }));
            },

            // Liked songs
            getLiked() { return this._get('vybzz_liked'); },
            isLiked(videoId) { return this.getLiked().some(s => s.videoId === videoId); },
            toggleLike(song) {
                let liked = this.getLiked();
                const idx = liked.findIndex(s => s.videoId === song.videoId);
                if (idx >= 0) {
                    liked.splice(idx, 1);
                    this._set('vybzz_liked', liked);
                    showToast('Removed from Liked Songs');
                    return false;
                } else {
                    liked.unshift(song);
                    this._set('vybzz_liked', liked);
                    showToast('Added to Liked Songs');
                    return true;
                }
            },

            // Playlists
            getPlaylists() { return this._get('vybzz_playlists'); },
            createPlaylist(name) {
                const playlists = this.getPlaylists();
                const pl = { id: Date.now().toString(), name, songs: [] };
                playlists.push(pl);
                this._set('vybzz_playlists', playlists);
                showToast(`Playlist "${name}" created`);
                return pl;
            },
            deletePlaylist(id) {
                let playlists = this.getPlaylists();
                playlists = playlists.filter(p => p.id !== id);
                this._set('vybzz_playlists', playlists);
                showToast('Playlist deleted');
            },
            addToPlaylist(playlistId, song) {
                const playlists = this.getPlaylists();
                const pl = playlists.find(p => p.id === playlistId);
                if (!pl) return;
                if (pl.songs.some(s => s.videoId === song.videoId)) {
                    showToast('Already in playlist');
                    return;
                }
                pl.songs.push(song);
                this._set('vybzz_playlists', playlists);
                showToast(`Added "${song.title}" to "${pl.name}"`);
            },
            removeFromPlaylist(playlistId, videoId) {
                const playlists = this.getPlaylists();
                const pl = playlists.find(p => p.id === playlistId);
                if (!pl) return;
                pl.songs = pl.songs.filter(s => s.videoId !== videoId);
                this._set('vybzz_playlists', playlists);
            },

            // Local files
            localFiles: [],
            addLocalFile(file) {
                const url = URL.createObjectURL(file);
                const localSong = {
                    videoId: 'local_' + Date.now() + '_' + Math.random().toString(36).slice(2),
                    title: file.name.replace(/\.[^.]+$/, ''),
                    artist: 'Local File',
                    thumbnail: defaultThumb,
                    duration: 0,
                    isLocal: true,
                    localUrl: url
                };
                this.localFiles.push(localSong);
                return localSong;
            },

            // Play history
            getHistory() {
                return this._get('vybzz_history') || [];
            },

            addToHistory(song) {
                if (!song || song.isLocal) return;
                let history = this.getHistory();
                // Remove if already in history (move to top)
                history = history.filter(s => s.videoId !== song.videoId);
                // Add to front
                history.unshift({
                    videoId: song.videoId,
                    title: song.title,
                    artist: song.artist,
                    thumbnail: song.thumbnail,
                    duration: song.duration,
                    audioUrl: song.audioUrl,
                    playedAt: Date.now()
                });
                // Keep max 50
                if (history.length > 50) history = history.slice(0, 50);
                this._set('vybzz_history', history);
            },

            removeFromHistory(videoId) {
                let history = this.getHistory();
                history = history.filter(s => s.videoId !== videoId);
                this._set('vybzz_history', history);
            },

            clearHistory() {
                this._set('vybzz_history', []);
            },
            getLastSong() {
                const song = localStorage.getItem('vybzz_last_song');
                return song ? JSON.parse(song) : null;
            },
            setLastSong(song) {
                if (!song) return;
                localStorage.setItem('vybzz_last_song', JSON.stringify(song));
            }
        };

        // === SPOTIFY PLAYLIST IMPORTER ===
        const SpotifyImporter = {
            extractPlaylistId(url) {
                const match = url.match(/playlist\/([a-zA-Z0-9]+)/);
                return match ? match[1] : null;
            },

            async fetchPlaylistTracks(playlistId) {
                // Use CORS proxy to fetch Spotify embed page
                const embedUrl = `https://open.spotify.com/embed/playlist/${playlistId}`;
                const proxyUrl = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(embedUrl)}`;
                const res = await fetch(proxyUrl);
                if (!res.ok) throw new Error('Failed to fetch Spotify playlist');
                const html = await res.text();

                const match = html.match(/__NEXT_DATA__[^>]*>(.*?)<\/script>/);
                if (!match) throw new Error('Could not parse playlist data');

                const data = JSON.parse(match[1]);
                const entity = data.props?.pageProps?.state?.data?.entity;
                if (!entity) throw new Error('No playlist data found');

                return {
                    name: entity.name || 'Spotify Import',
                    tracks: (entity.trackList || []).map(t => ({
                        title: t.title,
                        artist: t.subtitle
                    }))
                };
            },

            async importPlaylist(url) {
                const playlistId = this.extractPlaylistId(url);
                if (!playlistId) throw new Error('Invalid Spotify URL. Paste a link like:\nhttps://open.spotify.com/playlist/...');

                const { name, tracks } = await this.fetchPlaylistTracks(playlistId);
                if (tracks.length === 0) throw new Error('No tracks found in this playlist');

                // Create playlist immediately
                const playlist = Library.createPlaylist(name);

                return { playlist, name, tracks };
            },

            // Background matching — updates DOM rows as each track resolves
            async matchTracksInBackground(playlistId, tracks) {
                let matched = 0;
                let failed = 0;

                for (let i = 0; i < tracks.length; i++) {
                    const track = tracks[i];
                    const row = document.getElementById(`import-row-${i}`);

                    try {
                        const results = await SaavnAPI.search(`${track.title} ${track.artist}`, 1);
                        if (results.length > 0) {
                            const song = SaavnAPI.normalizeSong(results[0]);
                            Library.addToPlaylist(playlistId, song);
                            matched++;

                            // Update the row with real data
                            if (row) {
                                row.querySelector('.sli-thumb').src = song.thumbnail || defaultThumb;
                                row.querySelector('.sli-status').innerHTML = '<span style="color:#1DB954">✓</span>';
                                row.classList.add('matched');
                                row.style.opacity = '1';
                                // Make it playable
                                row.onclick = () => Player.playSong(song);
                            }
                        } else {
                            failed++;
                            if (row) {
                                row.querySelector('.sli-status').innerHTML = '<span style="color:var(--text-subdued)">✗</span>';
                                row.style.opacity = '0.4';
                            }
                        }
                    } catch (e) {
                        failed++;
                        if (row) {
                            row.querySelector('.sli-status').innerHTML = '<span style="color:var(--text-subdued)">✗</span>';
                            row.style.opacity = '0.4';
                        }
                    }

                    // Update counter
                    const counter = document.getElementById('import-counter');
                    if (counter) counter.textContent = `${matched} matched · ${failed} not found · ${tracks.length - matched - failed} remaining`;

                    // Small delay to avoid rate limiting
                    if (i % 5 === 4) await new Promise(r => setTimeout(r, 300));
                }

                // Final update
                const counter = document.getElementById('import-counter');
                if (counter) counter.textContent = `✅ Done — ${matched}/${tracks.length} songs imported`;

                return { matched, failed };
            }
        };

        // === PLAYER CONTROLLER ===
        const Player = {
            audio: $('#audio-player'),
            queue: [],
            currentIndex: -1,
            isPlaying: false,
            shuffle: false,
            repeat: 0, // 0=off, 1=all, 2=one
            currentSong: null,
            _streamData: null,

            async playSong(song, queue = null, index = 0) {
                if (queue) {
                    this.queue = [...queue];
                    this.currentIndex = index;
                }
                this.currentSong = song;
                this._updatePlayerUI(song);
                Library.addToHistory(song);
                Library.setLastSong(song);

                try {
                    let audioUrl;
                    if (song.isLocal) {
                        audioUrl = song.localUrl;
                    } else if (song.audioUrl) {
                        // Already have direct URL from search results
                        audioUrl = song.audioUrl;
                    } else {
                        // Fetch from API as fallback
                        const data = await SaavnAPI.getSongDetails(song.videoId);
                        const dlArr = data.downloadUrl || [];
                        if (dlArr.length === 0) throw new Error('No audio stream found');
                        audioUrl = dlArr[dlArr.length - 1].link; // 320kbps
                    }

                    this.audio.src = audioUrl;
                    await this.audio.play();
                    this.isPlaying = true;
                    this._updatePlayPauseIcon();
                } catch (e) {
                    console.error('Play error:', e);
                    showToast('Failed to play — trying next...');
                    if (this.queue.length > 1) setTimeout(() => this.next(), 1500);
                }
            },

            togglePlay() {
                if (!this.currentSong) return;
                if (this.isPlaying) {
                    this.audio.pause();
                } else {
                    this.audio.play();
                }
                this.isPlaying = !this.isPlaying;
                this._updatePlayPauseIcon();
            },

            next() {
                if (this.queue.length === 0) return;
                if (this.repeat === 2) {
                    this.audio.currentTime = 0;
                    this.audio.play();
                    return;
                }
                let nextIdx;
                if (this.shuffle) {
                    nextIdx = Math.floor(Math.random() * this.queue.length);
                } else {
                    nextIdx = this.currentIndex + 1;
                    if (nextIdx >= this.queue.length) {
                        if (this.repeat === 1) nextIdx = 0;
                        else return;
                    }
                }
                this.currentIndex = nextIdx;
                this.playSong(this.queue[nextIdx]);
            },

            prev() {
                if (this.queue.length === 0) return;
                if (this.audio.currentTime > 3) {
                    this.audio.currentTime = 0;
                    return;
                }
                let prevIdx = this.currentIndex - 1;
                if (prevIdx < 0) prevIdx = this.repeat === 1 ? this.queue.length - 1 : 0;
                this.currentIndex = prevIdx;
                this.playSong(this.queue[prevIdx]);
            },

            seek(fraction) {
                if (this.audio.duration) {
                    this.audio.currentTime = fraction * this.audio.duration;
                }
            },

            setVolume(fraction) {
                this.audio.volume = Math.max(0, Math.min(1, fraction));
                $('#volume-fill').style.width = (fraction * 100) + '%';
            },

            toggleShuffle() {
                this.shuffle = !this.shuffle;
                $('#shuffle-btn').style.color = this.shuffle ? 'var(--accent)' : '';
                showToast(this.shuffle ? 'Shuffle on' : 'Shuffle off');
            },

            toggleRepeat() {
                this.repeat = (this.repeat + 1) % 3;
                const btn = $('#repeat-btn');
                if (this.repeat === 0) { btn.style.color = ''; btn.title = 'Repeat'; }
                else if (this.repeat === 1) { btn.style.color = 'var(--accent)'; btn.title = 'Repeat all'; }
                else { btn.style.color = 'var(--accent)'; btn.title = 'Repeat one'; }
                showToast(['Repeat off', 'Repeat all', 'Repeat one'][this.repeat]);
            },

            async fetchAndQueueSuggestions(songId) {
                try {
                    const json = await SaavnAPI._fetchWithRetry(`/api/songs/${songId}/suggestions`);
                    const songs = (json.data || []).map(item => SaavnAPI.normalizeSong(item));
                    if (songs.length > 0) {
                        this.queue.push(...songs);
                        showToast('Loading similar songs...');
                    }
                } catch (e) {
                    console.error('Suggestions failed', e);
                }
            },

            _updatePlayerUI(song) {
                $('#player-title').textContent = song.title || 'Unknown';
                $('#player-artist').textContent = song.artist || song.uploaderName || 'Unknown artist';
                $('#player-thumb').src = song.thumbnail || defaultThumb;
                // Update like button
                const likeBtn = $('#player-like-btn');
                if (song.isLocal) {
                    likeBtn.style.display = 'none';
                } else {
                    likeBtn.style.display = '';
                    likeBtn.classList.toggle('liked', Library.isLiked(song.videoId));
                }
                // Update document title
                document.title = `${song.title} — VYBZZ`;
                // Sync full-screen player
                $('#fs-title').textContent = song.title || 'Unknown';
                $('#fs-artist').textContent = song.artist || song.uploaderName || 'Unknown artist';
                $('#fs-artwork-img').src = song.thumbnail || defaultThumb;
                $('#fs-bg').style.backgroundImage = `url(${song.thumbnail || defaultThumb})`;
                const fsLike = $('#fs-like-btn');
                if (!song.isLocal) {
                    fsLike.classList.toggle('liked', Library.isLiked(song.videoId));
                }

                // Dynamically update lists so playing song turns green instantly
                $$('.song-list-item, .search-list-item, .song-card').forEach(el => {
                    if (el.dataset.vid === song.videoId) {
                        el.classList.add('playing');
                        const titleEl = el.querySelector('.title, .sli-title');
                        if (titleEl && !titleEl.style.color) titleEl.style.color = 'var(--accent)'; // if inline style is used
                    } else {
                        el.classList.remove('playing');
                        const titleEl = el.querySelector('.title, .sli-title');
                        if (titleEl && titleEl.style.color === 'var(--accent)') titleEl.style.color = '';
                    }
                });

                // Reset lyrics button and panel
                $('#fs-lyrics-btn').classList.remove('active');
                $('#fs-lyrics-panel').classList.remove('show');
                $('#lyrics-content').innerHTML = '';
            },

            _updatePlayPauseIcon() {
                const icon = $('#play-icon');
                const fsIcon = $('#fs-play-icon');
                if (this.isPlaying) {
                    icon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
                    fsIcon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
                    // Pause eq animation if needed (bonus logic, but CSS infinite is fine)
                    document.body.classList.remove('is-paused');
                } else {
                    icon.innerHTML = '<path d="M8 5v14l11-7z"/>';
                    fsIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
                    document.body.classList.add('is-paused');
                }
            },

            _updateProgress() {
                if (!this.audio.duration || window.isDraggingProgress) return;
                const pct = (this.audio.currentTime / this.audio.duration) * 100;
                $('#progress-fill').style.width = pct + '%';
                $('#current-time').textContent = formatTime(this.audio.currentTime);
                $('#total-time').textContent = formatTime(this.audio.duration);
                // Sync full-screen player progress
                $('#fs-progress-fill').style.width = pct + '%';
                $('#fs-current-time').textContent = formatTime(this.audio.currentTime);
                $('#fs-total-time').textContent = formatTime(this.audio.duration);
            },

            init() {
                this.audio.addEventListener('timeupdate', () => this._updateProgress());
                this.audio.addEventListener('ended', async () => {
                    if (this.currentSong) {
                        const features = AudioCache.get(this.currentSong.videoId);
                        UserProfile.recordCompletion(this.currentSong, 1.0, features);
                    }
                    if (this.currentSong && this.currentIndex >= this.queue.length - 2) {
                        await this.fetchAndQueueSuggestions(this.currentSong.videoId);
                    }
                    this.next();
                });
                this.audio.addEventListener('play', () => {
                    this.isPlaying = true;
                    this._updatePlayPauseIcon();
                    // Update Android notification with song info
                    if (typeof AndroidBridge !== 'undefined' && this.currentSong) {
                        try {
                            AndroidBridge.updateNowPlaying(
                                this.currentSong.title || 'Unknown',
                                this.currentSong.artist || '',
                                this.currentSong.thumbnail || ''
                            );
                        } catch (e) { }
                    }
                });
                this.audio.addEventListener('pause', () => {
                    this.isPlaying = false;
                    this._updatePlayPauseIcon();
                    if (typeof AndroidBridge !== 'undefined') {
                        try { AndroidBridge.onAudioPause(); } catch (e) { }
                    }
                });
                this.setVolume(0.7);
            }
        };

        // === UI RENDERER ===
        const UI = {
            currentView: 'home',
            _searchDebounce: null,

            setView(view, data) {
                this.currentView = view;
                // Update sidebar active state
                $$('.sidebar-nav-item').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.view === view);

                // Update mobile nav active state

                switch (view) {

                    case 'search': this.renderSearch(area, data); break;
                    case 'liked': this.renderLiked(area); break;
                    case 'library': this.renderLibrary(area); break;
                    case 'playlist': this.renderPlaylist(area, data); break;
                    case 'artist': this.renderArtist(area, data); break;
                    default: this.renderHome(area);
                }
            },

            // --- Helpers ---
            _songCard(song, idx, queue, options = {}) {
                const card = document.createElement('div');
                card.className = 'song-card fade-in';
                card.dataset.vid = song.videoId;
                card.style.animationDelay = (idx * 0.04) + 's';

                card.innerHTML = `
                <div class="song-card-img">
                    <img src="${song.thumbnail || defaultThumb}" alt="${song.title}" loading="lazy" onerror="this.src='${defaultThumb}'">
                </div>
                <div class="song-card-play">
                    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </div>
                <div class="song-card-title" title="${song.title}">${song.title}</div>
                <div class="song-card-artist">${artistHTML}</div>
            `;
                card.addEventListener('click', (e) => {
                    const authLink = e.target.closest('.artist-link');

                        UI.setView('artist', { id: authLink.dataset.id, name: authLink.dataset.name });

                card.addEventListener('contextmenu', (e) => {

            },

            _songListItem(song, idx, queue, options = {}) {
                const isPlaying = Player.currentSong && Player.currentSong.videoId === song.videoId;
                const isLiked = !song.isLocal && Library.isLiked(song.videoId);
                const row = document.createElement('div');
                row.className = 'song-list-item' + (isPlaying ? ' playing' : '');
                row.dataset.vid = song.videoId;

                let artistHTML = song.artist || song.uploaderName || '';

                }

                row.innerHTML = `
                <div class="song-list-num">
                    <span class="num-text">${idx + 1}</span>

                </div>
                <div class="song-list-info">
                    <img src="${song.thumbnail || defaultThumb}" alt="" onerror="this.src='${defaultThumb}'">
                    <div class="song-list-info-text">
                        <div class="title" style="${isPlaying ? 'color:var(--accent)' : ''}">${song.title}</div>
                        <div class="artist">${artistHTML}</div>
                    </div>
                </div>
                <div class="song-list-album">${artistHTML}</div>
                <div class="song-list-duration">${song.duration ? formatTime(song.duration) : '--:--'}</div>
                <div class="song-list-actions">
                    ${song.isLocal ? '' : `<button class="like-btn ${isLiked ? 'liked' : ''}" data-vid="${song.videoId}" title="Like">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="${isLiked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2">
                            <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
                        </svg>
                    </button>`}
                    <button class="more-btn" title="More Options">

                            <path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
                        </svg>
                    </button>
                </div>
            `;
                row.addEventListener('click', (e) => {
                    const authLink = e.target.closest('.artist-link');
                    if (authLink) {
                        e.stopPropagation();
                        UI.setView('artist', { id: authLink.dataset.id, name: authLink.dataset.name });
                        return;
                    }
                    if (e.target.closest('.like-btn')) {
                        const liked = Library.toggleLike(song);
                        const btn = e.target.closest('.like-btn');
                        btn.classList.toggle('liked', liked);
                        btn.querySelector('svg').setAttribute('fill', liked ? 'currentColor' : 'none');
                        // Update player like btn if same song
                        if (Player.currentSong && Player.currentSong.videoId === song.videoId) {
                            $('#player-like-btn').classList.toggle('liked', liked);
                        }
                        return;
                    }
                    if (e.target.closest('.more-btn')) {
                        this._showContextMenu(e, song);
                        return;
                    }
                    if (options.isSearchResult) {
                        Player.playSong(song, [song], 0);
                    } else {
                        Player.playSong(song, queue, idx);
                    }
                });
                row.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    if (!song.isLocal) this._showContextMenu(e, song);
                });
                return row;
            },

            _showContextMenu(e, song) {
                const menu = $('#context-menu');
                const playlists = Library.getPlaylists();
                const isLiked = Library.isLiked(song.videoId);

                let playlistItems = playlists.length > 0
                    ? playlists.map(p => `<div class="context-menu-item" data-action="add-to-pl" data-plid="${p.id}">➕ Add to "${p.name}"</div>`).join('')
                    : '<div class="context-menu-item" style="color:var(--text-subdued);pointer-events:none">No playlists yet</div>';

                let currentPlAction = '';
                if (UI.currentView === 'playlist' && UI.currentViewData) {
                    currentPlAction = `<div class="context-menu-item" data-action="remove-from-pl" style="color:var(--danger)">🗑️ Remove from this playlist</div>`;
                }

                menu.innerHTML = `
                <div class="context-menu-item" data-action="like">${isLiked ? '💔 Remove from Liked' : '❤️ Add to Liked'}</div>
                <div class="context-menu-item" data-action="play-next">⏭️ Play next</div>
                <div class="context-menu-item" data-action="add-queue">📋 Add to queue</div>
                ${currentPlAction}
                <div style="height:1px;background:var(--bg-highlight);margin:4px 0"></div>
                <div style="padding:8px 12px; font-size:10px; text-transform:uppercase; color:var(--text-subdued); letter-spacing:1px">Add to Playlist</div>
                ${playlistItems}
            `;
                menu.style.left = Math.min(e.clientX, window.innerWidth - 220) + 'px';
                menu.style.top = Math.min(e.clientY, window.innerHeight - 300) + 'px';
                menu.classList.add('show');

                const handler = (evt) => {
                    const item = evt.target.closest('.context-menu-item');
                    if (!item) { menu.classList.remove('show'); document.removeEventListener('click', handler); return; }
                    const action = item.dataset.action;
                    if (action === 'like') {
                        Library.toggleLike(song);
                    } else if (action === 'play-next') {
                        if (Player.currentIndex >= 0) {
                            Player.queue.splice(Player.currentIndex + 1, 0, song);
                            showToast('Playing next');
                        }
                    } else if (action === 'add-queue') {
                        Player.queue.push(song);
                        showToast('Added to queue');
                    } else if (action === 'add-to-pl') {
                        Library.addToPlaylist(item.dataset.plid, song);
                    } else if (action === 'remove-from-pl') {
                        Library.removeFromPlaylist(UI.currentViewData, song.videoId);
                        UI.setView('playlist', UI.currentViewData);
                    }
                    menu.classList.remove('show');
                    document.removeEventListener('click', handler);
                    document.removeEventListener('touchstart', handler);
                };
                setTimeout(() => {
                    document.addEventListener('click', handler);
                    document.addEventListener('touchstart', handler);
                }, 10);
            },

            async renderHome(area) {
                try {
                    area.innerHTML = '';

                    hero.className = 'hero-banner fade-in';
                    hero.innerHTML = `<h2>Good ${new Date().getHours() < 12 ? 'Morning' : new Date().getHours() < 18 ? 'Afternoon' : 'Evening'}</h2><p>Your daily music refresh — FckSpotify</p>`;
                    area.appendChild(hero);

                    // Recently Played section
                    const history = Library.getHistory();
                    if (history.length > 0) {
                        const histHeader = document.createElement('div');
                        histHeader.className = 'section-header';
                        histHeader.innerHTML = '<h2>Recently Played 🕐</h2>';
                        area.appendChild(histHeader);

                        const histGrid = document.createElement('div');
                        histGrid.className = 'songs-grid';
                        let selectMode = false;
                        const selected = new Set();

                        history.slice(0, 20).forEach((song, i) => {
                            const card = this._songCard(song, i, history);
                            card.dataset.videoId = song.videoId;
                            let pressTimer;

                            const enterSelectMode = () => {
                                selectMode = true;
                                selected.add(song.videoId);
                                card.style.outline = '2px solid var(--accent)';
                                card.style.opacity = '0.7';
                                if (!document.getElementById('hist-delete-btn')) {
                                    const delBtn = document.createElement('button');
                                    delBtn.id = 'hist-delete-btn';
                                    delBtn.textContent = 'Delete Selected';
                                    delBtn.style.cssText = 'background:#e53935;color:#fff;border:none;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;margin-left:auto;';
                                    delBtn.onclick = () => {
                                        selected.forEach(id => {
                                            Library.removeFromHistory(id);
                                            const el = histGrid.querySelector(`[data-video-id="${id}"]`);
                                            if (el) { el.style.transition = 'opacity 0.3s,transform 0.3s'; el.style.opacity = '0'; el.style.transform = 'scale(0.8)'; setTimeout(() => el.remove(), 300); }
                                        });
                                        showToast(`${selected.size} song${selected.size > 1 ? 's' : ''} removed`);
                                        selected.clear();
                                        selectMode = false;
                                        delBtn.remove();
                                    };
                                    histHeader.style.display = 'flex';
                                    histHeader.style.alignItems = 'center';
                                    histHeader.appendChild(delBtn);
                                }
                                showToast('Select songs to delete');
                            };

                            card.addEventListener('touchstart', () => {
                                if (!selectMode) pressTimer = setTimeout(enterSelectMode, 500);
                            });
                            card.addEventListener('touchend', (e) => {
                                clearTimeout(pressTimer);
                                if (selectMode) {
                                    e.preventDefault(); e.stopPropagation();
                                    if (selected.has(song.videoId)) {
                                        selected.delete(song.videoId); card.style.outline = ''; card.style.opacity = '1';
                                        if (selected.size === 0) { selectMode = false; const btn = document.getElementById('hist-delete-btn'); if (btn) btn.remove(); }
                                    } else {
                                        selected.add(song.videoId); card.style.outline = '2px solid var(--accent)'; card.style.opacity = '0.7';
                                    }
                                    const btn = document.getElementById('hist-delete-btn');
                                    if (btn) btn.textContent = `Delete (${selected.size})`;
                                }
                            }, true);
                            card.addEventListener('touchmove', () => clearTimeout(pressTimer));
                            histGrid.appendChild(card);
                        });
                        area.appendChild(histGrid);
                    }

                    // Check cache first
                    const cached = Library.getHomeCache();
                    if (cached) {

                            area.appendChild(secGrid);
                        });
                        return;
                    }

                    // No cache or expired, fetch from API
                    const gathered = [];
                    const sectionsDef = [
                        { title: 'Trending Hindi 🔥', playlistId: '47599074' },
                        { title: 'Today\'s Biggest Hits 🚀', playlistId: '1297282877' },
                        { title: 'Punjabi Top Hits 🎶', playlistId: '4144832' },
                        { title: 'Romantic Favorites 💕', playlistId: '1223344164' },
                        { title: 'Party Non-Stop 🎉', playlistId: '79653434' },

                        area.appendChild(secGrid);

                        try {

                            secGrid.innerHTML = '';

                const pBar = $(pBarId);
                if (!pBar) return;
                let isDragging = false;

                const handleMove = (e) => {
                    const rect = pBar.getBoundingClientRect();
                    let clientX = 0;
                    if (e.touches && e.touches.length > 0) clientX = e.touches[0].clientX;
                    else if (e.changedTouches && e.changedTouches.length > 0) clientX = e.changedTouches[0].clientX;
                    else clientX = e.clientX;

                    const x = clientX - rect.left;
                    let fraction = Math.max(0, Math.min(1, x / rect.width));

                    if (type === 'fs') {
                        $('#fs-progress-fill').style.width = (fraction * 100) + '%';
                        if (Player.audio.duration) $('#fs-current-time').textContent = formatTime(fraction * Player.audio.duration);
                    } else if (type === 'progress') {
                        $('#progress-fill').style.width = (fraction * 100) + '%';
                        if (Player.audio.duration) $('#current-time').textContent = formatTime(fraction * Player.audio.duration);
                    } else if (type === 'volume') {
                        $('#volume-fill').style.width = (fraction * 100) + '%';
                    }
                    return fraction;
                };

                    isDragging = true;
                    if (type === 'fs' || type === 'progress') window.isDraggingProgress = true;
                    handleMove(e);
                    // Prevent page scroll while dragging slider
                    if (e.cancelable) e.preventDefault();
                };

                const onMove = (e) => {
                    if (!isDragging) return;
                    handleMove(e);
                    if (e.cancelable) e.preventDefault();
                };

                    if (!isDragging) return;

                        setTimeout(() => { window.isDraggingProgress = false; }, 200);
                    } else if (type === 'volume') {
                        Player.setVolume(fraction);
                    }
                };

                pBar.addEventListener('touchstart', startDrag, { passive: false });

                window.addEventListener('mousemove', onMove, { passive: false });
                window.addEventListener('touchmove', onMove, { passive: false });

                    const fraction = handleMove(e);
                    if (type === 'fs' || type === 'progress') Player.seek(fraction);
                    else if (type === 'volume') Player.setVolume(fraction);
                });

                    this.songScores = JSON.parse(localStorage.getItem('vybzz_song_scores') || '{}');
                    this.skipHistory = JSON.parse(localStorage.getItem('vybzz_skip_history') || '[]');
                    this.featureProfile = JSON.parse(localStorage.getItem('vybzz_feature_profile') || '{"liked":{},"completed":{},"skipped":{},"byHour":{}}');
                } catch (e) { }
            },

            save() {
                localStorage.setItem('vybzz_artist_scores', JSON.stringify(this.artistScores));
                localStorage.setItem('vybzz_lang_scores', JSON.stringify(this.languageScores));
                localStorage.setItem('vybzz_song_scores', JSON.stringify(this.songScores));
                localStorage.setItem('vybzz_skip_history', JSON.stringify(this.skipHistory));
                localStorage.setItem('vybzz_feature_profile', JSON.stringify(this.featureProfile));

                if (currentUser) {
                    _supabase.from('user_profile').upsert({
                        user_id: currentUser.id,
                        artist_scores: this.artistScores,
                        language_scores: this.languageScores,
                        song_scores: this.songScores,
                        skip_history: this.skipHistory.slice(0, 100),
                        feature_profile: this.featureProfile,
                        updated_at: new Date().toISOString()
                    }).then().catch(() => { });
                }
            },

            // Blend audio features into a running average
            _blendFeatures(target, features, weight = 1) {
                if (!features) return;
                const keys = ['energy', 'valence', 'danceability', 'tempo', 'acousticness'];
                if (!target.count) target.count = 0;
                target.count += weight;
                keys.forEach(k => {
                    if (features[k] === undefined) return;
                    target[k] = target[k] === undefined
                        ? features[k]
                        : target[k] + (features[k] - target[k]) * (weight / target.count);
                });
            },

            recordPlay(song) {
                if (!song || song.isLocal) return;
                this._playStartTime = Date.now();
                this._currentSongId = song.videoId;

                if (!this.songScores[song.videoId]) {
                    this.songScores[song.videoId] = {
                        title: song.title, artist: song.artist,
                        language: song.language || '',
                        plays: 0, replays: 0, totalCompletion: 0,
                        skips: 0, liked: false, addedToPlaylist: false,
                        score: 0, lastPlayed: null
                    };
                }

                const s = this.songScores[song.videoId];
                const now = Date.now();
                const isReplay = (now - (s.lastPlayed || 0)) < 600000 && s.plays > 0;
                s.plays += 1;
                if (isReplay) s.replays += 1;
                s.lastPlayed = now;

                const artist = song.artist || '';
                this.artistScores[artist] = (this.artistScores[artist] || 0) + 3;
                if (song.language) {
                    this.languageScores[song.language] = (this.languageScores[song.language] || 0) + 3;
                }

                this._recalcScore(song.videoId);
                this.save();
            },

            recordCompletion(song, fraction, audioFeatures = null) {
                if (!song || song.isLocal) return;
                if (!this.songScores[song.videoId]) return;

                const s = this.songScores[song.videoId];
                s.totalCompletion += fraction;

                if (fraction >= 0.8) {
                    // Strong positive signal — blend into completed profile
                    this._blendFeatures(this.featureProfile.completed, audioFeatures, 1);

                    // Also blend into hour-specific profile
                    const hour = new Date().getHours();
                    if (!this.featureProfile.byHour[hour]) this.featureProfile.byHour[hour] = {};
                    this._blendFeatures(this.featureProfile.byHour[hour], audioFeatures, 1);

                    const artist = song.artist || '';
                    this.artistScores[artist] = (this.artistScores[artist] || 0) + 2;
                    if (song.language) {
                        this.languageScores[song.language] = (this.languageScores[song.language] || 0) + 2;
                    }
                }

                this._recalcScore(song.videoId);
                this.save();
            },

            recordSkip(song, audioFeatures = null) {
                if (!song || song.isLocal) return;
                const listenedSeconds = (Date.now() - (this._playStartTime || Date.now())) / 1000;
                const fraction = Player.audio.duration ? (listenedSeconds / Player.audio.duration) : 0;

                this.recordCompletion(song, fraction, audioFeatures);

                if (listenedSeconds < 15) {
                    if (!this.songScores[song.videoId]) return;
                    const s = this.songScores[song.videoId];
                    s.skips += 1;

                    // Blend into skipped features profile — we'll avoid this zone
                    this._blendFeatures(this.featureProfile.skipped, audioFeatures, 1);

                    const artist = song.artist || '';
                    this.artistScores[artist] = (this.artistScores[artist] || 0) - 2;
                    if (song.language) {
                        this.languageScores[song.language] = (this.languageScores[song.language] || 0) - 1;
                    }

                    if (s.skips >= 3) {
                        this.skipHistory = [song.videoId, ...this.skipHistory].slice(0, 100);
                    }

                    this._recalcScore(song.videoId);
                    this.save();
                }
            },

            recordLike(song, audioFeatures = null) {
                if (!song || song.isLocal) return;

                if (!this.songScores[song.videoId]) {
                    this.songScores[song.videoId] = {
                        title: song.title, artist: song.artist,
                        language: song.language || '',
                        plays: 0, replays: 0, totalCompletion: 0,
                        skips: 0, liked: false, addedToPlaylist: false,
                        score: 0, lastPlayed: null
                    };
                }

                const s = this.songScores[song.videoId];
                s.liked = !s.liked;

                // Liked songs get strongest feature weight
                if (s.liked) {
                    this._blendFeatures(this.featureProfile.liked, audioFeatures, 2);
                }

                const multiplier = s.liked ? 1 : -1;
                const artist = song.artist || '';
                this.artistScores[artist] = (this.artistScores[artist] || 0) + (5 * multiplier);
                if (song.language) {
                    this.languageScores[song.language] = (this.languageScores[song.language] || 0) + (5 * multiplier);
                }

                this._recalcScore(song.videoId);
                this.save();
            },

            recordPlaylistAdd(song) {
                if (!song || song.isLocal) return;
                if (!this.songScores[song.videoId]) return;
                this.songScores[song.videoId].addedToPlaylist = true;
                this._recalcScore(song.videoId);
                this.save();
            },

            _recalcScore(videoId) {
                const s = this.songScores[videoId];
                if (!s) return;
                const avgCompletion = s.plays > 0 ? s.totalCompletion / s.plays : 0;
                s.score = (s.plays * 3)
                    + (s.replays * 8)
                    + (avgCompletion * 5)
                    + (s.liked ? 10 : 0)
                    + (s.addedToPlaylist ? 7 : 0)
                    - (s.skips * 4);
            },

            // Build target audio features for current moment
            getTargetFeatures() {
                const hour = new Date().getHours();
                const liked = this.featureProfile.liked;
                const completed = this.featureProfile.completed;
                const hourProfile = this.featureProfile.byHour[hour] || {};
                const skipped = this.featureProfile.skipped;

                // No data yet — return null, SmartQueue will skip targets
                if (!completed.energy && !liked.energy) return null;

                const keys = ['energy', 'valence', 'danceability', 'tempo', 'acousticness'];
                const base = {};

                // Weighted blend: liked(50%) + completed(30%) + hourProfile(20%)
                keys.forEach(k => {
                    const vals = [];
                    if (liked[k] !== undefined) vals.push({ v: liked[k], w: 0.5 });
                    if (completed[k] !== undefined) vals.push({ v: completed[k], w: 0.3 });
                    if (hourProfile[k] !== undefined) vals.push({ v: hourProfile[k], w: 0.2 });
                    if (vals.length === 0) return;
                    const totalW = vals.reduce((s, x) => s + x.w, 0);
                    base[k] = vals.reduce((s, x) => s + x.v * (x.w / totalW), 0);
                });

                // Time-of-day adjustment
                if (hour >= 5 && hour < 9) {
                    base.energy = Math.min(1, (base.energy || 0.6) + 0.15);
                    base.valence = Math.min(1, (base.valence || 0.5) + 0.1);
                } else if (hour >= 22 || hour < 2) {
                    base.energy = Math.max(0, (base.energy || 0.5) - 0.2);
                    base.acousticness = Math.min(1, (base.acousticness || 0.3) + 0.2);
                }

                // Avoid skipped zone — set min_energy to skip zone + buffer
                if (skipped.energy !== undefined) {
                    // If we keep skipping high energy → cap max, if low energy → set min
                    if (skipped.energy > 0.7) base.max_energy = skipped.energy - 0.1;
                    if (skipped.energy < 0.4) base.min_energy = skipped.energy + 0.1;
                }

                return base;
            },

            getTopSongs(n = 5) {
                return Object.entries(this.songScores)
                    .filter(([id, s]) => s.score > 0 && !this.skipHistory.includes(id))
                    .sort((a, b) => b[1].score - a[1].score)
                    .slice(0, n)
                    .map(([id, s]) => ({ videoId: id, ...s }));
            },

            getTopArtist() {
                const entries = Object.entries(this.artistScores);
                if (entries.length === 0) return null;
                return entries.sort((a, b) => b[1] - a[1])[0][0];
            },

            getTopLanguage() {
                const entries = Object.entries(this.languageScores);
                if (entries.length === 0) return null;
                return entries.sort((a, b) => b[1] - a[1])[0][0];
            },

            getTimeContext() {
                const h = new Date().getHours();
                if (h >= 5 && h < 9) return 'morning fresh energy songs';
                if (h >= 9 && h < 12) return 'focus work hindi songs';
                if (h >= 12 && h < 17) return 'afternoon bollywood hits';
                if (h >= 17 && h < 21) return 'evening drive punjabi songs';
                return 'late night chill sad songs';
            },

            scoreAndRank(songs) {
                const topLang = this.getTopLanguage();
                return songs
                    .filter(s => !this.skipHistory.includes(s.videoId))
                    .map(s => ({
                        ...s,
                        _score: (this.artistScores[s.artist] || 0)
                            + (s.language && s.language === topLang ? 4 : 0)
                            + (this.languageScores[s.language] || 0) * 0.5
                            + (this.songScores[s.videoId]?.score || 0) * 0.3
                    }))
                    .sort((a, b) => b._score - a._score);
            }
        };

        const AudioCache = {
            get(videoId) {
                try {
                    const cache = JSON.parse(localStorage.getItem('vybzz_audio_features') || '{}');
                    return cache[videoId] || null;
                } catch (e) { return null; }
            },

            set(videoId, features) {
                try {
                    const cache = JSON.parse(localStorage.getItem('vybzz_audio_features') || '{}');
                    cache[videoId] = features;
                    localStorage.setItem('vybzz_audio_features', JSON.stringify(cache));

                    if (currentUser) {
                        _supabase.from('user_profile').upsert({
                            user_id: currentUser.id,
                            audio_features: cache,
                            updated_at: new Date().toISOString()
                        }).then().catch(() => { });
                    }
                } catch (e) { }
            },

            getAll() {
                try {
                    return JSON.parse(localStorage.getItem('vybzz_audio_features') || '{}');
                } catch (e) { return {}; }
            }
        };

        // === SMART RECOMMENDATIONS (personal only) ===
        const SmartQueue = {
            async build(currentSong) {
                try {
                    const topLanguage = UserProfile.getTopLanguage();
                    let spotifyRecommendedSongs = [];
                    let likedSeeds = [];

                    // === STEP 1 — Build target audio features from user profile ===
                    const targets = UserProfile.getTargetFeatures();

                    // === STEP 2 — Get Spotify IDs for top scored songs ===
                    const topScored = UserProfile.getTopSongs(3);
                    const spotifyIds = [];

                    for (const song of topScored) {
                        const cached = AudioCache.get(song.videoId);
                        if (cached?.spotifyId) {
                            spotifyIds.push(cached.spotifyId);
                        } else {
                            const track = await SpotifyAPI.searchTrack(`${song.title} ${song.artist}`);
                            if (track) spotifyIds.push(track.id);
                        }
                    }

                    // Also include current song as seed if cached
                    const currentCached = AudioCache.get(currentSong.videoId);
                    if (currentCached?.spotifyId && !spotifyIds.includes(currentCached.spotifyId)) {
                        spotifyIds.unshift(currentCached.spotifyId);
                    }

                    // === STEP 3 — Spotify recommendations with audio feature targets ===
                    if (spotifyIds.length > 0) {
                        const spotifyTracks = await SpotifyAPI.getRecommendations(spotifyIds, targets || {}, 20);

                        const jioResults = await Promise.all(
                            spotifyTracks.map(track => {
                                const query = `${track.name} ${track.artists[0]?.name || ''}`;
                                return SaavnAPI.search(query, 1)
                                    .then(r => r.length > 0 ? SaavnAPI.normalizeSong(r[0]) : null)
                                    .catch(() => null);
                            })
                        );
                        spotifyRecommendedSongs = jioResults.filter(Boolean);
                    }

                    // === STEP 4 — Supabase seeds fallback ===
                    if (currentUser && spotifyRecommendedSongs.length < 10) {
                        const [{ data: likes }, { data: history }] = await Promise.all([
                            _supabase.from('likes').select('song_data').eq('user_id', currentUser.id).limit(50),
                            _supabase.from('play_history').select('song_data')
                                .eq('user_id', currentUser.id)
                                .order('played_at', { ascending: false }).limit(100)
                        ]);

                        const likedSongs = likes ? likes.map(l => l.song_data) : [];
                        const historySongs = history ? history.map(h => h.song_data) : [];
                        const combinedPool = [...likedSongs, ...likedSongs, ...historySongs];

                        if (combinedPool.length > 0) {
                            const shuffled = combinedPool.sort(() => Math.random() - 0.5);
                            const seenSeeds = new Set();
                            const uniqueSeeds = [];
                            for (const s of shuffled) {
                                if (!seenSeeds.has(s.videoId)) {
                                    seenSeeds.add(s.videoId);
                                    uniqueSeeds.push(s);
                                }
                                if (uniqueSeeds.length >= 4) break;
                            }
                            const seedResults = await Promise.all(
                                uniqueSeeds.map(seed =>
                                    SaavnAPI._fetchWithRetry(`/api/songs/${seed.videoId}/suggestions`)
                                        .then(j => (j.data || []).map(s => SaavnAPI.normalizeSong(s)))
                                        .catch(() => [])
                                )
                            );
                            likedSeeds = seedResults.flat();
                        }
                    }

                    // === STEP 5 — Language/mood fallback ===
                    const timeContext = UserProfile.getTimeContext();
                    const langTimeQuery = topLanguage ? `${topLanguage} ${timeContext}` : timeContext;

                    const [currentSuggestions, moodSongs] = await Promise.all([
                        SaavnAPI._fetchWithRetry(`/api/songs/${currentSong.videoId}/suggestions`)
                            .then(j => (j.data || []).map(s => SaavnAPI.normalizeSong(s)))
                            .catch(() => []),
                        SaavnAPI.search(langTimeQuery, 6)
                            .then(r => r.map(s => SaavnAPI.normalizeSong(s)))
                            .catch(() => [])
                    ]);

                    // === MERGE ===
                    const currentTitleBase = currentSong.title.toLowerCase()
                        .replace(/\(.*?\)/g, '')
                        .replace(/reprise|unplugged|remix|cover|version|remaster/gi, '')
                        .trim();

                    const seen = new Set([currentSong.videoId]);
                    const merged = [];

                    for (const song of [...spotifyRecommendedSongs, ...likedSeeds, ...currentSuggestions, ...moodSongs]) {
                        if (!song?.videoId) continue;
                        const titleBase = song.title.toLowerCase()
                            .replace(/\(.*?\)/g, '')
                            .replace(/reprise|unplugged|remix|cover|version|remaster/gi, '')
                            .trim();
                        if (seen.has(song.videoId)) continue;
                        if (titleBase === currentTitleBase) continue;
                        seen.add(song.videoId);
                        merged.push(song);
                    }

                    return UserProfile.scoreAndRank(merged).slice(0, 25);

                } catch (e) {
                    console.error('SmartQueue build failed', e);
                    return [];
                }
            }
        };

        // === AUTH MANAGER ===
        const Auth = {
            isSignup: false,

            isInitializing: false,
            async init() {
                if (this.isInitializing) return;
                this.isInitializing = true;
                console.log('VYBZZ: Auth.init() started');

                // Load profile and cache IN PARALLEL with session check
                UserProfile.load();
                const cachedHome = Library.getHomeCache();

                try {
                    const { data: { session }, error } = await _supabase.auth.getSession();

                    if (session?.user) {
                        currentUser = session.user;
                        // If we are already showing the app (from the instant script), just refresh data
                        if (document.getElementById('app').style.display === 'flex') {
                            this.updateStatus(`Linked: ${currentUser.email.split('@')[0]}`, '#1DB954');
                            UI.renderHome($('#content-area'), cachedHome); // Render cache immediately
                            this.isInitializing = false;
                            return;
                        }
                        await this.onLogin();
                        return;
                    }

                    if (error) console.warn('VYBZZ: Session fetch error:', error.message);

                    // No session or error -> Make sure auth screen is visible
                    this.showAuthScreen();
                } catch (e) {
                    console.error('VYBZZ: Fatal Auth Init Error:', e);
                    this.showAuthScreen();
                } finally {
                    this.isInitializing = false;
                }

                if (!this._authBound) {
                    _supabase.auth.onAuthStateChange(async (event, session) => {
                        console.log('VYBZZ: Auth event:', event);
                        if (event === 'SIGNED_IN' && session?.user) {
                            currentUser = session.user;
                            await this.onLogin();
                        } else if (event === 'SIGNED_OUT') {
                            currentUser = null;
                            if (this._rt) _supabase.removeChannel(this._rt);
                            this.showAuthScreen();
                            this.updateStatus('Logged Out', '#e74c3c');
                        }
                    });
                    this._authBound = true;
                }
            },

            updateStatus(text, color) {
                const dot = document.getElementById('cloud-dot');
                const label = document.getElementById('cloud-text');
                if (dot) dot.style.background = color;
                if (label) label.textContent = text;
            },

            showAuthScreen() {
                const screen = document.getElementById('auth-screen');
                screen.style.display = 'flex';
                screen.classList.remove('hidden');
                document.getElementById('auth-splash').style.display = 'none';
                document.getElementById('auth-login-box').style.display = 'block';

                document.getElementById('app').style.display = 'none';
                document.getElementById('player-bar').style.display = 'none';
                document.getElementById('mobile-nav').style.display = 'none';
            },

            hideAuthScreen() {
                const screen = document.getElementById('auth-screen');
                screen.classList.add('hidden');
                // Wait for fade transition before setting display:none
                setTimeout(() => {
                    if (screen.classList.contains('hidden')) screen.style.display = 'none';
                }, 400);

                document.getElementById('app').style.display = 'flex';
                document.getElementById('player-bar').style.display = 'flex';
                const isMobile = window.innerWidth < 768;
                if (isMobile) document.getElementById('mobile-nav').style.display = 'flex';
            },

            async onLogin() {
                console.log('VYBZZ: Running onLogin follow-ups');
                this.hideAuthScreen();
                this.updateStatus(`Linked: ${currentUser.email.split('@')[0]}`, '#1DB954');

                // Load initial home view
                UI.setView('home');

                // Do NOT await these — let them run in background so UI isn't blocked by slow network
                this.syncFromSupabase().catch(e => console.warn('Background sync failed', e));
                this.loadProfileFromSupabase().catch(e => console.warn('Profile load failed', e));
                this.setupRealtime();
            },

            setupRealtime() {
                if (!currentUser) return;
                console.log('VYBZZ: Setting up Realtime listeners');

                if (this._rt) _supabase.removeChannel(this._rt);

                this._rt = _supabase.channel('user-sync-' + currentUser.id)
                    .on('postgres_changes', {
                        event: '*',
                        schema: 'public',
                        table: 'likes',
                        filter: `user_id=eq.${currentUser.id}`
                    }, (p) => {
                        console.log('VYBZZ: RT Like', p);
                        this.syncFromSupabase();
                    })
                    .on('postgres_changes', {
                        event: '*',
                        schema: 'public',
                        table: 'playlists',
                        filter: `user_id=eq.${currentUser.id}`
                    }, (p) => {
                        console.log('VYBZZ: RT Playlist', p);
                        this.syncFromSupabase();
                    })
                    .subscribe();
            },

            renderUserPill() {
                // Pill removed per user request, using Account tab instead
            },

            async syncFromSupabase() {
                if (!currentUser) return;
                try {
                    // Fetch liked songs
                    const { data: likes } = await _supabase.from('likes')
                        .select('song_data')
                        .eq('user_id', currentUser.id)
                        .order('created_at', { ascending: false });

                    if (likes && likes.length > 0) {
                        const cloudLiked = likes.map(l => l.song_data);
                        const localLiked = Library.getLiked();
                        // Merge — cloud takes priority, add any local-only songs
                        const merged = [...cloudLiked];
                        localLiked.forEach(ls => {
                            if (!merged.some(cs => cs.videoId === ls.videoId)) merged.push(ls);
                        });
                        Library._set('vybzz_liked', merged);
                    }

                    // Fetch playlists
                    const { data: playlists } = await _supabase.from('playlists')
                        .select('*')
                        .eq('user_id', currentUser.id)
                        .order('created_at', { ascending: true });

                    if (playlists && playlists.length > 0) {
                        const cloudPlaylists = playlists.map(p => ({
                            id: p.id,
                            name: p.name,
                            songs: p.songs || []
                        }));
                        Library._set('vybzz_playlists', cloudPlaylists);
                        UI.renderSidebarPlaylists();
                    }
                } catch (e) {
                    console.warn('Sync from Supabase failed, using localStorage', e);
                }
            },

            async loadProfileFromSupabase() {
                if (!currentUser) return;
                try {
                    const { data } = await _supabase.from('user_profile')
                        .select('*')
                        .eq('user_id', currentUser.id)
                        .single();
                    if (data) {
                        UserProfile.artistScores = data.artist_scores || {};
                        UserProfile.languageScores = data.language_scores || {};
                        UserProfile.songScores = data.song_scores || {};
                        UserProfile.skipHistory = data.skip_history || [];
                        UserProfile.save();
                        if (data.audio_features) {
                            localStorage.setItem('vybzz_audio_features', JSON.stringify(data.audio_features));
                        }
                    }
                } catch (e) { }
            }
        };

        // === PATCH Library to sync to Supabase ===

                        song_id: song.videoId,

                    _supabase.from('likes').delete()
