<!DOCTYPE html>
<html lang="en">

<head>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VYBZZ — Cloud Sync (Supabase)</title>
    <meta name="description" content="VYBZZ — A premium ad-free music player. FckSpotify.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        /* ===== RESET & BASE ===== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #121212;
            --bg-secondary: #181818;
            --bg-elevated: #242424;
            --bg-highlight: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --text-subdued: #6a6a6a;
            --accent: #1DB954;
            --accent-hover: #1ed760;
            --accent-dim: rgba(29, 185, 84, 0.15);
            --danger: #e74c3c;
            --sidebar-width: 280px;
            --player-height: 90px;
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html,
        body {
            height: 100%;
            font-family: 'Inter', -apple-system, sans-serif;
            background: #000;
            color: var(--text-primary);
            overflow: hidden;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
            background: none;
            color: inherit;
        }

        input {
            font-family: inherit;
        }

        ul {
            list-style: none;
        }

        /* ===== APP LAYOUT ===== */
        #app {
            display: none;
            /* Hidden until login */
            height: 100vh;
            width: 100vw;
        }

        /* ===== SIDEBAR ===== */
        #sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background: #000000;
            display: flex;
            flex-direction: column;
            padding: 0;
            height: calc(100vh - var(--player-height));
            overflow-y: auto;
        }

        #sidebar::-webkit-scrollbar {
            width: 0;
        }

        .sidebar-logo {
            padding: 24px 24px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-logo h1 {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(135deg, var(--accent), #14a844);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-logo .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .sidebar-nav {
            padding: 0 12px;
            margin-bottom: 16px;
        }

        .sidebar-nav-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 10px 16px;
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 14px;
            transition: all var(--transition);
            cursor: pointer;
            width: 100%;
        }

        .sidebar-nav-item:hover {
            color: var(--text-primary);
        }

        .sidebar-nav-item.active {
            color: var(--text-primary);
            background: var(--bg-highlight);
        }

        .sidebar-nav-item svg {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
        }

        .sidebar-divider {
            height: 1px;
            background: var(--bg-highlight);
            margin: 8px 24px;
        }

        .sidebar-section-title {
            padding: 16px 24px 8px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-subdued);
        }

        .sidebar-playlist-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 24px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: color var(--transition);
        }

        .sidebar-playlist-item:hover {
            color: var(--text-primary);
        }

        .create-playlist-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 24px;
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 600;
            transition: color var(--transition);
            width: 100%;
        }

        .create-playlist-btn:hover {
            color: var(--text-primary);
        }

        .create-playlist-btn .icon-box {
            width: 28px;
            height: 28px;
            background: var(--text-secondary);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 18px;
            font-weight: 700;
            transition: background var(--transition);
        }

        .create-playlist-btn:hover .icon-box {
            background: var(--text-primary);
        }

        /* ===== MAIN CONTENT ===== */
        #main-content {
            flex: 1;
            height: calc(100vh - var(--player-height));
            overflow-y: auto;
            background: var(--bg-primary);
            padding: 0 0 32px 0;
            /* Added bottom padding */
        }

        #main-content::-webkit-scrollbar {
            width: 8px;
        }

        #main-content::-webkit-scrollbar-track {
            background: transparent;
        }

        #main-content::-webkit-scrollbar-thumb {
            background: var(--bg-highlight);
            border-radius: 4px;
        }

        #main-content::-webkit-scrollbar-thumb:hover {
            background: var(--text-subdued);
        }

        /* ===== TOP BAR ===== */
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            background: rgba(18, 18, 18, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .top-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .top-brand .logo-icon {
            width: 28px;
            height: 28px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #000;
            font-weight: 800;
            animation: logoFloat 3s ease-in-out infinite;
        }

        @keyframes logoFloat {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-3px);
            }
        }

        .top-brand h2 {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--accent), #1ed760);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(29, 185, 84, 0.1);
        }

        .search-container {
            position: relative;
            width: 380px;
            display: none;
            /* Hidden by default, shown in search view */
        }

        .search-container input {
            width: 100%;
            padding: 10px 16px 10px 42px;
            background: var(--bg-elevated);
            border: 2px solid transparent;
            border-radius: 24px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: all var(--transition);
        }

        .search-container input::placeholder {
            color: var(--text-subdued);
        }

        .search-container input:focus {
            border-color: var(--accent);
            background: var(--bg-highlight);
        }

        .search-container .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-subdued);
            pointer-events: none;
        }

        .search-suggestions {
            position: fixed;
            top: 64px;
            left: 0;
            right: 0;
            height: calc(100vh - 64px);
            background: var(--bg-primary);
            padding: 16px 0;
            box-shadow: none;
            overflow-y: auto;
            display: none;
            z-index: 90;
            border-radius: 0;
            scrollbar-width: none;
        }

        .search-suggestions::-webkit-scrollbar {
            display: none;
        }

        .search-suggestions.show {
            display: block;
        }

        /* Text autocomplete items */
        .suggest-text-item {
            padding: 10px 16px;
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: background var(--transition);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .suggest-text-item:hover {
            background: var(--bg-highlight);
            color: var(--text-primary);
        }

        .suggest-text-item .suggest-icon {
            flex-shrink: 0;
            width: 18px;
            height: 18px;
            color: var(--text-subdued);
        }

        .suggest-text-item .suggest-label {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .suggest-text-item .suggest-fill {
            flex-shrink: 0;
            width: 18px;
            height: 18px;
            color: var(--text-subdued);
            opacity: 0.5;
            transform: rotate(-45deg);
        }

        /* Song result items in suggestion */
        .suggest-song-item {
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background var(--transition);
        }

        .suggest-song-item:hover {
            background: var(--bg-highlight);
        }

        .suggest-song-item img {
            width: 44px;
            height: 44px;
            border-radius: 4px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .suggest-song-info {
            flex: 1;
            min-width: 0;
        }

        .suggest-song-info .suggest-song-title {
            font-size: 14px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .suggest-song-info .suggest-song-meta {
            font-size: 12px;
            color: var(--text-subdued);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .suggest-song-item .suggest-add {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            color: var(--text-subdued);
            border: 1px solid var(--text-subdued);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.6;
        }

        .suggest-divider {
            height: 1px;
            background: var(--bg-highlight);
            margin: 4px 16px;
        }

        .upload-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-elevated);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all var(--transition);
        }

        .upload-btn:hover {
            background: var(--bg-highlight);
            color: var(--text-primary);
            transform: scale(1.02);
        }

        /* ===== SECTION HEADERS ===== */
        .section-header {
            padding: 24px 32px 16px;
            display: flex;
            align-items: baseline;
            justify-content: space-between;
        }

        .section-header h2 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .section-header .see-all {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-subdued);
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color var(--transition);
        }

        .section-header .see-all:hover {
            color: var(--text-primary);
        }

        /* ===== SONG CARDS GRID (horizontal scroll) ===== */
        .songs-grid {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding: 0 16px 16px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .songs-grid::-webkit-scrollbar {
            display: none;
        }

        .songs-grid .song-card {
            min-width: 155px;
            max-width: 155px;
            scroll-snap-align: start;
            flex-shrink: 0;
        }

        .song-card {
            background: var(--bg-elevated);
            padding: 16px;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: background 0.2s ease, transform 0.15s ease;
            position: relative;
        }

        .song-card:hover {
            background: var(--bg-highlight);
        }

        .song-card:active {
            transform: scale(0.96);
        }

        .song-card-img {
            width: 100%;
            aspect-ratio: 1;
            border-radius: var(--radius-md);
            object-fit: cover;
            background: var(--bg-elevated);
            margin-bottom: 14px;
            position: relative;
            overflow: hidden;
        }

        .song-card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: var(--radius-md);
        }

        .song-card-play {
            position: absolute;
            bottom: 22px;
            right: 22px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .song-card:hover .song-card-play {
            opacity: 1;
            transform: translateY(0);
        }

        .song-card-play:hover {
            transform: scale(1.06) !important;
            background: var(--accent-hover);
        }

        .song-card-play svg {
            width: 22px;
            height: 22px;
            fill: #000;
        }

        .song-card-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-card-artist {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ===== SONG LIST (Liked Songs / Playlist) ===== */
        .song-list {
            padding: 0 32px 24px;
        }

        .song-list-header {
            display: grid;
            grid-template-columns: 40px 1fr 1fr 80px 50px;
            gap: 16px;
            padding: 8px 16px;
            border-bottom: 1px solid var(--bg-highlight);
            color: var(--text-subdued);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .song-list-item {
            display: grid;
            grid-template-columns: 40px 1fr 1fr 80px 50px;
            gap: 16px;
            padding: 10px 16px;
            border-radius: var(--radius-md);
            align-items: center;
            cursor: pointer;
            transition: background 0.15s ease, transform 0.15s ease;
        }

        .song-list-item:hover {
            background: var(--bg-elevated);
        }

        .song-list-item:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.05);
        }

        .song-list-item.playing {
            background: var(--accent-dim);
        }

        .song-list-num {
            font-size: 14px;
            color: var(--text-subdued);
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .playing-eq {
            display: none;
            align-items: flex-end;
            justify-content: space-between;
            width: 14px;
            height: 14px;
            margin-right: 8px;
        }

        .playing .playing-eq {
            display: inline-flex;
        }

        .playing .num-text {
            display: none;
        }

        .playing-eq span {
            width: 3px;
            background-color: var(--accent);
            border-radius: 1px;
            animation: eq-bounce 1s infinite ease-in-out;
            transform-origin: bottom;
        }

        .playing-eq span:nth-child(1) {
            animation-delay: 0.0s;
            height: 100%;
        }

        .playing-eq span:nth-child(2) {
            animation-delay: 0.3s;
            height: 100%;
        }

        .playing-eq span:nth-child(3) {
            animation-delay: 0.6s;
            height: 100%;
        }

        @keyframes eq-bounce {

            0%,
            100% {
                transform: scaleY(0.4);
            }

            50% {
                transform: scaleY(1);
            }
        }

        body.is-paused .playing-eq span {
            animation-play-state: paused;
            transform: scaleY(0.4);
        }


        .song-list-info {
            display: flex;
            align-items: center;
            gap: 12px;
            overflow: hidden;
        }

        .song-list-info img {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .song-list-info-text {
            overflow: hidden;
        }

        .song-list-info-text .title {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-list-info-text .artist {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-list-album {
            font-size: 13px;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .song-list-duration {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .song-list-actions {
            display: flex;
            justify-content: center;
        }

        .like-btn {
            padding: 4px;
            color: var(--text-subdued);
            transition: all var(--transition);
        }

        .like-btn:hover {
            color: var(--text-primary);
            transform: scale(1.15);
        }

        .like-btn.liked {
            color: var(--accent);
        }

        .like-btn.liked:hover {
            color: var(--accent-hover);
        }

        .more-btn {
            background: none;
            border: none;
            padding: 4px;
            color: var(--text-subdued);
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .more-btn:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        /* ===== HERO BANNER ===== */
        .hero-banner {
            padding: 48px 32px 32px;
            background: linear-gradient(180deg, #1a3a2a 0%, var(--bg-primary) 100%);
        }

        .hero-banner h2 {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .hero-banner p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* ===== PLAYLIST HEADER ===== */
        .playlist-hero {
            display: flex;
            align-items: flex-end;
            gap: 24px;
            padding: 48px 32px 32px;
            background: linear-gradient(180deg, #2a1a3a 0%, var(--bg-primary) 100%);
        }

        .playlist-hero-img {
            width: 200px;
            height: 200px;
            border-radius: var(--radius-md);
            background: var(--bg-elevated);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            flex-shrink: 0;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .playlist-hero-info h2 {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .playlist-hero-info p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 32px;
            text-align: center;
        }

        .empty-state .icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 14px;
            color: var(--text-secondary);
            max-width: 320px;
        }

        /* ===== BOTTOM PLAYER ===== */
        #player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--player-height);
            z-index: 100;
            background: linear-gradient(180deg, #181818 0%, #0a0a0a 100%);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
        }

        .player-track-info {
            display: flex;
            align-items: center;
            gap: 14px;
            width: 280px;
            min-width: 200px;
        }

        .player-track-info img {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            background: var(--bg-elevated);
        }

        .player-track-info .info {
            overflow: hidden;
        }

        .player-track-info .info .title {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }

        .player-track-info .info .artist {
            font-size: 11px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-track-info .player-like-btn {
            padding: 6px;
            color: var(--text-subdued);
            transition: all var(--transition);
            flex-shrink: 0;
        }

        .player-track-info .player-like-btn:hover {
            color: var(--text-primary);
        }

        .player-track-info .player-like-btn.liked {
            color: var(--accent);
        }

        .player-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            flex: 1;
            max-width: 600px;
        }

        .player-buttons {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .player-btn {
            padding: 6px;
            color: var(--text-secondary);
            transition: all var(--transition);
        }

        .player-btn:hover {
            color: var(--text-primary);
            transform: scale(1.1);
        }

        .player-btn svg {
            width: 20px;
            height: 20px;
        }

        .play-pause-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
        }

        .play-pause-btn:hover {
            transform: scale(1.06);
        }

        .play-pause-btn svg {
            width: 16px;
            height: 16px;
            fill: #000;
        }

        .player-progress {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
        }

        .player-progress .time {
            font-size: 11px;
            color: var(--text-subdued);
            min-width: 36px;
            text-align: center;
        }

        .progress-bar-container {
            flex: 1;
            height: 4px;
            background: var(--bg-highlight);
            border-radius: 2px;
            position: relative;
            cursor: pointer;
            transition: height var(--transition);
        }

        .progress-bar-container:hover {
            height: 6px;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--text-primary);
            border-radius: 2px;
            position: relative;
            width: 0%;
            transition: none;
        }

        .progress-bar-container:hover .progress-bar-fill {
            background: var(--accent);
        }

        .progress-bar-fill::after {
            content: '';
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--text-primary);
            opacity: 0;
            transition: opacity var(--transition);
        }

        .progress-bar-container:hover .progress-bar-fill::after {
            opacity: 1;
        }

        .player-extra {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 200px;
            justify-content: flex-end;
        }

        .player-extra .player-btn svg {
            width: 18px;
            height: 18px;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .volume-bar-container {
            width: 80px;
            height: 4px;
            background: var(--bg-highlight);
            border-radius: 2px;
            position: relative;
            cursor: pointer;
        }

        .volume-bar-container:hover {
            height: 6px;
        }

        .volume-bar-fill {
            height: 100%;
            background: var(--text-primary);
            border-radius: 2px;
            width: 70%;
            position: relative;
        }

        .volume-bar-container:hover .volume-bar-fill {
            background: var(--accent);
        }

        /* ===== VIDEO OVERLAY ===== */
        #video-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: var(--player-height);
            z-index: 50;
            background: rgba(0, 0, 0, 0.95);
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        #video-overlay.show {
            display: flex;
        }

        #video-overlay video {
            max-width: 90%;
            max-height: 80%;
            border-radius: var(--radius-lg);
            background: #000;
        }

        #video-overlay .close-video {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px;
            color: var(--text-primary);
            font-size: 28px;
            z-index: 51;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background var(--transition);
        }

        #video-overlay .close-video:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* ===== LOADING / TOAST ===== */
        .loading-spinner {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--bg-highlight);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #toast {
            position: fixed;
            bottom: calc(var(--player-height) + 16px);
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--accent);
            color: #000;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 200;
            pointer-events: none;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 300;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--bg-elevated);
            border-radius: var(--radius-lg);
            padding: 32px;
            width: 400px;
            max-width: 90%;
        }

        .modal h3 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .modal input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-highlight);
            border: 2px solid transparent;
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: border-color var(--transition);
            margin-bottom: 16px;
        }

        .modal input:focus {
            border-color: var(--accent);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            transition: all var(--transition);
        }

        .modal-btn.primary {
            background: var(--accent);
            color: #000;
        }

        .modal-btn.primary:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
        }

        .modal-btn.secondary {
            color: var(--text-secondary);
        }

        .modal-btn.secondary:hover {
            color: var(--text-primary);
        }

        /* ===== CONTEXT MENU ===== */
        .context-menu {
            display: none;
            position: fixed;
            z-index: 250;
            background: var(--bg-elevated);
            border-radius: var(--radius-md);
            padding: 4px;
            min-width: 200px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        }

        .context-menu.show {
            display: block;
        }

        .context-menu-item {
            padding: 10px 16px;
            font-size: 13px;
            color: var(--text-secondary);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .context-menu-item:hover {
            background: var(--bg-highlight);
            color: var(--text-primary);
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeInUp 0.4s ease forwards;
        }

        /* ===== ARTIST LINK ===== */
        .artist-link {
            cursor: pointer;
            transition: color 0.2s;
            position: relative;
            z-index: 2;
        }

        .artist-link:hover {
            color: var(--text-primary);
            text-decoration: underline;
        }

        /* ===== LYRICS ===== */
        .fs-lyrics-panel {
            position: absolute;
            top: 100px;
            bottom: 250px;
            left: 24px;
            right: 24px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            padding: 32px 24px;
            overflow-y: auto;
            display: none;
            z-index: 10;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
            scrollbar-width: none;
        }

        .fs-lyrics-panel.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .fs-lyrics-panel::-webkit-scrollbar {
            display: none;
        }

        .lyrics-content {
            font-size: 20px;
            line-height: 1.6;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
            text-align: left;
            white-space: pre-wrap;
        }

        .lyrics-empty {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-subdued);
            font-style: italic;
        }

        .fs-lyrics-btn.active {
            color: var(--accent) !important;
        }

        /* ===== MOBILE BOTTOM NAV ===== */
        #mobile-nav {
            display: flex;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: #0a0a0a;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            z-index: 200;
            justify-content: space-around;
            align-items: center;
            padding: 0;
        }

        .mobile-nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 6px 0;
            color: var(--text-subdued);
            background: none;
            border: none;
            font-family: inherit;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s;
            flex: 1;
        }

        .mobile-nav-btn.active {
            color: var(--text-primary);
        }

        .mobile-nav-btn svg {
            width: 22px;
            height: 22px;
        }

        /* ===== MOBILE-FIRST (Android App) ===== */
        #sidebar {
            display: none !important;
        }

        #app {
            flex-direction: column;
        }

        #main-content {
            height: calc(100vh - 64px - 56px);
            width: 100%;
            padding-bottom: 140px;
            /* Added more space to avoid overlapping with player */
            overflow-x: hidden;
        }

        .top-bar {
            padding: 12px 16px;
            gap: 8px;
            width: 100%;
        }

        .search-container {
            flex: 1;
            min-width: 0;
            width: 0;
            /* Lets flex calculate properly without intrinsic width */
        }

        #search-input {
            font-size: 14px;
            padding: 10px 14px 10px 40px;
        }

        .upload-btn {
            padding: 8px 12px;
            font-size: 0;
            gap: 0;
        }

        .upload-btn svg {
            width: 20px;
            height: 20px;
        }

        .section-header {
            padding: 16px 16px 12px;
        }

        .section-header h2 {
            font-size: 22px;
        }

        .songs-grid {
            gap: 10px;
            padding: 0 16px 12px;
        }

        .songs-grid .song-card {
            min-width: 140px;
            max-width: 140px;
        }

        .song-card {
            padding: 12px;
        }

        .song-card-play {
            opacity: 1;
            transform: translateY(0);
            width: 40px;
            height: 40px;
            bottom: 16px;
            right: 16px;
        }

        .song-card-play svg {
            width: 18px;
            height: 18px;
        }

        .song-card-title {
            font-size: 13px;
        }

        .song-card-artist {
            font-size: 11px;
        }

        .song-list {
            padding: 0 12px 16px;
        }

        .song-list-header {
            display: none;
        }

        .song-list-item {
            grid-template-columns: 1fr 50px;
            gap: 8px;
            padding: 8px 12px;
        }

        .song-list-num,
        .song-list-album,
        .song-list-duration {
            display: none;
        }

        .hero-banner {
            padding: 24px 16px 16px;
        }

        .hero-banner h2 {
            font-size: 28px;
        }

        .playlist-hero {
            padding: 24px 16px 20px;
            gap: 16px;
        }

        .playlist-hero-img {
            width: 120px;
            height: 120px;
            font-size: 40px;
        }

        .playlist-hero-info h2 {
            font-size: 28px;
        }

        /* Mini player */
        #player-bar {
            height: 64px;
            bottom: 56px;
            padding: 0 12px;
            gap: 8px;
        }

        .player-track-info {
            width: auto;
            min-width: 0;
            flex: 1;
            gap: 10px;
            overflow: hidden;
        }

        .player-track-info img {
            width: 44px;
            height: 44px;
        }

        .player-track-info .player-like-btn {
            display: none;
        }

        .player-controls {
            flex: 0;
            max-width: none;
            gap: 0;
        }

        .player-buttons {
            gap: 4px;
        }

        #shuffle-btn,
        #repeat-btn,
        #prev-btn {
            display: none;
        }

        .play-pause-btn {
            width: 36px;
            height: 36px;
        }

        .player-progress {
            display: none;
        }

        .player-extra {
            display: none;
        }

        .empty-state {
            padding: 48px 16px;
        }

        .empty-state .icon {
            font-size: 48px;
        }

        .context-menu {
            max-width: calc(100vw - 32px);
        }

        .modal {
            width: calc(100vw - 32px);
            max-width: 360px;
        }

        #video-overlay video {
            width: 100%;
            max-height: 80vh;
        }

        #toast {
            bottom: 130px;
            left: 16px;
            right: 16px;
            text-align: center;
        }

        /* ===== SEARCH LIST LAYOUT ===== */
        .search-list {
            padding: 0 16px 16px;
        }

        .search-list-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            cursor: pointer;
            border-radius: 6px;
            transition: transform 0.15s ease, background 0.15s ease;
        }

        .search-list-item:active {
            background: rgba(255, 255, 255, 0.05);
            transform: scale(0.98);
        }

        .search-list-item img {
            width: 50px;
            height: 50px;
            border-radius: 4px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .search-list-item .sli-info {
            flex: 1;
            min-width: 0;
            overflow: hidden;
        }

        .search-list-item .sli-title {
            font-size: 15px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
        }

        .search-list-item.playing .sli-title {
            color: var(--accent);
        }

        .search-list-item .sli-meta {
            font-size: 12px;
            color: var(--text-subdued);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        .search-list-item .sli-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }

        .search-list-item .sli-actions button {
            padding: 8px;
            color: var(--text-subdued);
            background: none;
            border: none;
        }

        /* ===== FULL-SCREEN PLAYER ===== */
        #fs-player {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 500;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
            overflow: hidden;
            touch-action: none;
        }

        #fs-player.dragging {
            transition: none !important;
        }

        .fs-drag-handle {
            width: 36px;
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.3);
            margin: 8px auto 0;
            position: relative;
            z-index: 10;
        }

        #fs-player.open {
            transform: translateY(0);
        }

        .fs-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-size: cover;
            background-position: center;
            filter: blur(60px) brightness(0.3);
            transform: scale(1.3);
            z-index: 0;
        }

        .fs-content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 16px 24px 32px;
        }

        .fs-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0 12px;
        }

        .fs-header button {
            padding: 8px;
            color: #fff;
            background: none;
            border: none;
        }

        .fs-header .fs-source {
            text-align: center;
            font-size: 11px;
            color: var(--text-subdued);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .fs-header .fs-source span {
            display: block;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            text-transform: none;
            letter-spacing: 0;
            margin-top: 2px;
        }

        .fs-artwork {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px 0 16px 0;
        }

        .fs-artwork img {
            width: 100%;
            max-width: 340px;
            aspect-ratio: 1;
            border-radius: 8px;
            object-fit: cover;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.6);
        }

        .fs-song-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0 16px;
        }

        .fs-song-info .fs-text {
            min-width: 0;
            flex: 1;
            overflow: hidden;
        }

        .fs-song-info .fs-title {
            font-size: 20px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .fs-song-info .fs-artist {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .fs-song-info .fs-like-btn {
            padding: 8px;
            color: var(--text-subdued);
            background: none;
            border: none;
            flex-shrink: 0;
        }

        .fs-song-info .fs-like-btn.liked {
            color: var(--accent);
        }

        .fs-progress {
            padding: 0 0 8px;
        }

        .fs-progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .fs-progress-bar:active {
            height: 8px;
        }

        .fs-progress-fill {
            height: 100%;
            background: #fff;
            border-radius: 2px;
            width: 0%;
            position: relative;
        }

        .fs-progress-fill::after {
            content: '';
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #fff;
        }

        .fs-times {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-subdued);
            margin-top: 6px;
        }

        .fs-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            padding: 8px 0 24px;
        }

        .fs-controls button {
            padding: 8px;
            color: var(--text-secondary);
            background: none;
            border: none;
        }

        .fs-controls button svg {
            width: 24px;
            height: 24px;
        }

        .fs-controls .fs-play-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fs-controls .fs-play-btn svg {
            width: 28px;
            height: 28px;
            fill: #000;
        }

        #auth-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 24px;
            transition: opacity 0.4s ease, visibility 0.4s;
        }

        #auth-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .skeleton-box {
            background: linear-gradient(90deg, #181818 25%, #242424 50%, #181818 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
            border-radius: 4px;
        }

        @keyframes skeleton-loading {
            0% {
                background-position: 100% 0;
            }

            100% {
                background-position: -100% 0;
            }
        }

        .auth-box {
            width: 100%;
            max-width: 380px;
            background: #181818;
            border-radius: 12px;
            padding: 40px 32px;
            animation: authFadeIn 0.6s ease-out;
        }

        @keyframes authFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-logo {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #1DB954, #14a844);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 8px;
        }

        .auth-tagline {
            font-size: 13px;
            color: #6a6a6a;
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-input {
            width: 100%;
            padding: 12px 16px;
            background: #242424;
            border: 2px solid transparent;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            margin-bottom: 12px;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        .auth-input:focus {
            border-color: #1DB954;
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: #1DB954;
            color: #000;
            font-weight: 700;
            font-size: 15px;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-family: inherit;
            margin-top: 4px;
            transition: background 0.2s;
        }

        .auth-btn:hover {
            background: #1ed760;
        }

        .auth-switch {
            text-align: center;
            margin-top: 20px;
