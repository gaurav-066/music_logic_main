            }
        };

        // === PATCH Player to record plays and use SmartQueue ===
        const _origPlaySong = Player.playSong.bind(Player);
        Player.playSong = async function (song, queue, index) {
            // Record skip on previous song BEFORE switching
            if (this.currentSong && this.isPlaying) {
                const prevFeatures = AudioCache.get(this.currentSong.videoId);
                UserProfile.recordSkip(this.currentSong, prevFeatures);
            }
            await _origPlaySong(song, queue, index);
            UserProfile.recordPlay(song);

            // Fetch and cache Spotify audio features in background
            SpotifyAPI.searchTrack(`${song.title} ${song.artist}`)
                .then(async spotifyTrack => {
                    if (!spotifyTrack) return;
                    const features = await SpotifyAPI.getAudioFeatures(spotifyTrack.id);
                    if (!features || features.error) return;

                    // Store spotify ID on song for later use
                    const stored = {
                        spotifyId: spotifyTrack.id,
                        danceability: features.danceability,
                        energy: features.energy,
                        valence: features.valence,
                        tempo: features.tempo,
                        acousticness: features.acousticness,
                        instrumentalness: features.instrumentalness
                    };

                    // Use AudioCache which handles both localStorage and Supabase sync
                    AudioCache.set(song.videoId, stored);
                })
                .catch(() => { }); // Never block playback
            // Fire and forget to Supabase
            if (currentUser) {
                _supabase.from('play_history').insert({
                    user_id: currentUser.id,
                    user_email: currentUser.email,
                    song_id: song.videoId,
                    song_data: song,
                    played_at: new Date().toISOString()
                }).then().catch(() => { });
            }
        };

        // Override fetchAndQueueSuggestions with SmartQueue
        Player.fetchAndQueueSuggestions = async function (songId) {
            try {
                const songs = await SmartQueue.build(this.currentSong);
                if (songs.length > 0) {
                    this.queue.push(...songs);

                    // Auto-save to "VYBZZ Picks" playlist
                    if (currentUser) {
                        const playlists = Library.getPlaylists();
                        let picksPl = playlists.find(p => p.name === 'VYBZZ Picks');

                        // Create it if doesn't exist
                        if (!picksPl) {
                            picksPl = Library.createPlaylist('VYBZZ Picks');
                        }

                        // Add songs (Library.addToPlaylist already deduplicates)
                        songs.slice(0, 10).forEach(song => {
                            Library.addToPlaylist(picksPl.id, song);
                        });

                        // Cap playlist at 50 songs — remove oldest if over
                        const updated = Library.getPlaylists().find(p => p.name === 'VYBZZ Picks');
                        if (updated && updated.songs.length > 50) {
                            updated.songs = updated.songs.slice(-50);
                            Library._set('vybzz_playlists', Library.getPlaylists().map(p =>
                                p.name === 'VYBZZ Picks' ? updated : p
                            ));
                        }

                        UI.renderSidebarPlaylists();
                    }
                }
            } catch (e) {
                console.error('SmartQueue failed', e);
            }
        };

        // === FRIEND ACTIVITY FEED ===
        // === ACCOUNT & SETTINGS VIEW ===
        UI.renderAccount = async function (area) {
            area.innerHTML = `
                <div class="hero-banner fade-in" style="background: linear-gradient(180deg, #1DB954 0%, var(--bg-primary) 100%)">
                    <h2 id="acc-name">Account</h2>
                    <p id="acc-email">${currentUser?.email || 'Not logged in'}</p>
                </div>
                
                <div class="settings-list fade-in">
                    <div class="settings-group">
                        <div class="settings-item" id="set-logout">
                            <div class="si-title">Log Out</div>
                            <div class="si-desc">Sign out of your VYBZZ account</div>
                        </div>
                        <div class="settings-item" id="set-clear">
                            <div class="si-title">Clear Taste Profile</div>
                            <div class="si-desc">Reset your personalized recommendations</div>
                        </div>
                    </div>

                    <div class="settings-header">SOCIAL FEED</div>
                    <div class="settings-group">
                        <div class="settings-item" id="set-friends">
                            <div class="si-title">Show Global Activity</div>
                            <div class="si-desc">See what others are playing right now</div>
                        </div>
                    </div>
                </div>
                <div id="friends-mini-feed" style="margin-top:20px; display:none"></div>
            `;

            $('#set-logout').onclick = async () => {
                if (confirm('Are you sure you want to log out?')) {
                    const { error } = await _supabase.auth.signOut();
                    if (error) {
                        showToast('Logout failed: ' + error.message);
                    } else {
                        showToast('Logged out');
                        // Auth listener handles the UI switch
                    }
                }
            };

            $('#set-clear').onclick = () => {
                if (confirm('Reset your artist scores and history? This cannot be undone.')) {
                    UserProfile.artistScores = {};
                    UserProfile.skipHistory = [];
                    UserProfile.save();
                    showToast('Taste profile reset');
                }
            };

            $('#set-friends').onclick = () => {
                const feed = $('#friends-mini-feed');
                if (feed.style.display === 'none') {
                    feed.style.display = 'block';
                    this.renderFriendsList(feed);
                    $('#set-friends').querySelector('.si-title').textContent = 'Hide Global Activity';
                } else {
                    feed.style.display = 'none';
                    $('#set-friends').querySelector('.si-title').textContent = 'Show Global Activity';
                }
            };
        };

        UI.renderFriendsList = async function (container) {
            container.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';
            try {
                const { data } = await _supabase.from('play_history')
                    .select('*')
                    .order('played_at', { ascending: false })
                    .limit(20);

                container.innerHTML = '';
                if (!data || data.length === 0) {
                    container.innerHTML = '<p style="text-align:center;color:#6a6a6a;padding:20px">No recent activity</p>';
                    return;
                }

                const list = document.createElement('div');
                list.className = 'search-list';
                data.forEach((item, i) => {
                    const song = item.song_data;
                    const name = (item.user_email || 'User').split('@')[0];
                    const isMe = currentUser && item.user_id === currentUser.id;
                    const row = document.createElement('div');
                    row.className = 'search-list-item fade-in';
                    row.style.animationDelay = (i * 0.02) + 's';
                    row.innerHTML = `
                        <img src="${song.thumbnail || defaultThumb}" style="width:40px;height:40px;border-radius:4px">
                        <div class="sli-info">
                            <div class="sli-title">${song.title}</div>
                            <div class="sli-meta">${isMe ? '👤 You' : '👥 ' + name} · ${song.artist}</div>
                        </div>
                    `;
                    row.onclick = () => Player.playSong(song, [song], 0);
                    list.appendChild(row);
                });
                container.appendChild(list);
            } catch (e) { container.innerHTML = '<p>Failed to load feed</p>'; }
        };

        function getTimeAgo(timestamp) {
            const diff = Date.now() - new Date(timestamp).getTime();
            const mins = Math.floor(diff / 60000);
            if (mins < 1) return 'just now';
            if (mins < 60) return `${mins}m ago`;
            const hrs = Math.floor(mins / 60);
            if (hrs < 24) return `${hrs}h ago`;
            return `${Math.floor(hrs / 24)}d ago`;
        }

        // === PATCH setView to handle account ===
        const _origSetView = UI.setView.bind(UI);
        UI.setView = function (view, data) {
            console.log('Setting view:', view);
            if (view === 'account') {
                this.currentView = 'account';
                const allNavs = document.querySelectorAll('.mobile-nav-btn, .sidebar-nav-item');
                allNavs.forEach(btn => btn.classList.toggle('active', btn.dataset.view === 'account'));
                const area = document.getElementById('content-area');
                if (area) this.renderAccount(area);
                return;
            }
            _origSetView(view, data);
        };

        // === ADD ACCOUNT TAB TO MOBILE NAV ===
        const mobileNav = document.getElementById('mobile-nav');
        const accBtn = document.createElement('button');
        accBtn.className = 'mobile-nav-btn';
        accBtn.dataset.view = 'account';
        accBtn.innerHTML = `
  <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22">
    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
  </svg>
  Account
`;
        accBtn.addEventListener('click', () => UI.setView('account'));
        mobileNav.appendChild(accBtn);

        // === AUTH UI EVENTS ===
        document.getElementById('auth-toggle').addEventListener('click', () => {
            Auth.isSignup = !Auth.isSignup;
            document.getElementById('auth-submit').textContent = Auth.isSignup ? 'Sign Up' : 'Log In';
            document.getElementById('auth-toggle').textContent = Auth.isSignup ? 'Log in instead' : 'Sign up';
            document.getElementById('auth-error').textContent = '';
        });

        document.getElementById('auth-submit').addEventListener('click', async () => {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value.trim();
            const errEl = document.getElementById('auth-error');
            const btn = document.getElementById('auth-submit');

            if (!email || !password) { errEl.textContent = 'Enter email and password'; return; }
            btn.textContent = 'Please wait...';
            btn.disabled = true;
            errEl.textContent = '';

            try {
                let result;
                if (Auth.isSignup) {
                    result = await _supabase.auth.signUp({ email, password });
                    if (result.error) throw result.error;
                    if (result.data?.user && !result.data.session) {
                        errEl.style.color = '#1DB954';
                        errEl.textContent = 'Check your email to confirm your account';
                        btn.textContent = Auth.isSignup ? 'Sign Up' : 'Log In';
                        btn.disabled = false;
                        return;
                    }
                } else {
                    result = await _supabase.auth.signInWithPassword({ email, password });
                    if (result.error) throw result.error;
                }
            } catch (e) {
                errEl.style.color = '#e74c3c';
                errEl.textContent = e.message || 'Auth failed';
                btn.textContent = Auth.isSignup ? 'Sign Up' : 'Log In';
                btn.disabled = false;
            }
        });

        document.getElementById('auth-email').addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('auth-password').focus();
        });
        document.getElementById('auth-password').addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('auth-submit').click();
        });

        // === BOOT ===
        document.addEventListener('DOMContentLoaded', () => {
            // Manual retry on status click
            const status = document.getElementById('cloud-status');
            if (status) status.onclick = () => {
                Auth.updateStatus('Retrying...', '#f1c40f');
                Auth.init();
            };

            Auth.init();
        });
    </script>
</body>
